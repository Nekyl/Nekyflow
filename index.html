<script src="js/config.js?v=6"></script>
<script src="js/api.js?v=5"></script>
<script src="js/ui.js?v=4"></script>
<script src="js/app.js?v=7"></script>
<style>
#installBtn {
display: none;
position: fixed;
bottom: 80px;
right: 20px;
z-index: 9999;
padding: 12px 24px;
background: var(--gold, #D4A746);
color: var(--bg-primary, #0a0a0a);
border: none;
border-radius: 12px;
font-size: 14px;
font-weight: 600;
cursor: pointer;
box-shadow: 0 4px 20px rgba(212,167,70,0.4);
}
#installBtn:hover { background: var(--gold-light, #E8C36A); }
</style>
<button id="installBtn">Instalar App</button>
<script>
let deferredPrompt;
const installBtn = document.getElementById('installBtn');

const isStandalone = window.matchMedia('(display-mode: standalone)').matches
|| window.navigator.standalone === true;

if (!isStandalone && 'serviceWorker' in navigator) {
navigator.serviceWorker.register('sw.js').catch(err => console.error('SW register error:', err));

window.addEventListener('beforeinstallprompt', (e) => {
e.preventDefault();
deferredPrompt = e;
installBtn.style.display = 'block';
});
}

installBtn.addEventListener('click', async () => {
if (!deferredPrompt) return;
deferredPrompt.prompt();
const { outcome } = await deferredPrompt.userChoice;
if (outcome === 'accepted') {
installBtn.style.display = 'none';
}
deferredPrompt = null;
});
</script>
</body>
</html>
